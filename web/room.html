<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete a la sala - Trinity</title>
    
    <!-- Android App Links -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- iOS Universal Links -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .room-code {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 32px;
            font-weight: bold;
            color: #7c3aed;
            letter-spacing: 4px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #e3f2fd;
            color: #1976d2;
        }

        .fallback-message {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>Únete a la sala de Trinity</h1>
        
        <div class="room-code" id="roomCode">Cargando...</div>
        
        <div id="status" class="status">
            <div class="spinner"></div>
            <p>Abriendo la app Trinity...</p>
        </div>

        <div id="fallbackMessage" class="fallback-message">
            <p>Si la app no se abre automáticamente, puedes:</p>
        </div>
        
        <a href="#" id="openApp" class="btn">Abrir Trinity</a>
        <a href="https://play.google.com/store/apps/details?id=com.trinityapp.mobile" class="btn btn-secondary">Descargar App</a>
    </div>

    <script>
        // Extraer código de sala de la URL
        const pathParts = window.location.pathname.split('/');
        const roomCode = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
        
        if (roomCode && roomCode !== 'room') {
            document.getElementById('roomCode').textContent = roomCode.toUpperCase();
            
            // Universal Link - Mismo dominio que la web
            const universalLink = `https://trinity-app.es/room/${roomCode.toUpperCase()}`;
            
            // Función para detectar si estamos en móvil
            function isMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }
            
            // Función para detectar iOS
            function isIOS() {
                return /iPad|iPhone|iPod/.test(navigator.userAgent);
            }
            
            // Función para detectar Android
            function isAndroid() {
                return /Android/.test(navigator.userAgent);
            }
            
            // Función para intentar abrir la app
            function tryOpenApp() {
                if (!isMobile()) {
                    // En desktop, mostrar mensaje diferente
                    document.getElementById('status').innerHTML = 
                        '<p>Escanea el código QR con tu móvil o envía este enlace:</p>';
                    return;
                }
                
                let appOpened = false;
                
                // Detectar si la app se abrió (página se oculta)
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        appOpened = true;
                    }
                };
                
                document.addEventListener('visibilitychange', handleVisibilityChange);
                
                // Intentar abrir con Universal Link
                if (isIOS()) {
                    // En iOS, simplemente redirigir - iOS maneja automáticamente Universal Links
                    window.location.href = universalLink;
                } else if (isAndroid()) {
                    // En Android, usar intent con fallback
                    const intentLink = `intent://room/${roomCode.toUpperCase()}#Intent;scheme=https;package=com.trinityapp.mobile;S.browser_fallback_url=${encodeURIComponent('https://play.google.com/store/apps/details?id=com.trinityapp.mobile')};end`;
                    window.location.href = intentLink;
                } else {
                    // Fallback genérico
                    window.location.href = universalLink;
                }
                
                // Después de 2 segundos, si no se abrió la app, mostrar fallback
                setTimeout(() => {
                    if (!appOpened && !document.hidden) {
                        document.getElementById('status').style.display = 'none';
                        document.getElementById('fallbackMessage').style.display = 'block';
                    }
                }, 2000);
                
                // Limpiar listener después de 5 segundos
                setTimeout(() => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                }, 5000);
            }
            
            // Actualizar botón
            const openAppBtn = document.getElementById('openApp');
            openAppBtn.href = universalLink;
            openAppBtn.onclick = function(e) {
                e.preventDefault();
                tryOpenApp();
            };
            
            // Intentar abrir automáticamente tan pronto como se carga la página
            tryOpenApp();
            
        } else {
            document.getElementById('roomCode').textContent = 'Código inválido';
            document.getElementById('status').innerHTML = 
                '<p style="color: #d32f2f;">No se pudo obtener el código de la sala</p>';
        }
    </script>
</body>
</html>
