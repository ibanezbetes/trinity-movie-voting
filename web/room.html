<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete a la sala - Trinity</title>
    
    <!-- Android App Links -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .room-code {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 4px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #e3f2fd;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>Únete a la sala de Trinity</h1>
        
        <div class="room-code" id="roomCode">Cargando...</div>
        
        <div id="status" class="status">
            <div class="spinner"></div>
            <p>Abriendo la app Trinity...</p>
        </div>

        <p>Si la app no se abre automáticamente:</p>
        
        <a href="#" id="openApp" class="btn">Abrir Trinity</a>
        <a href="https://play.google.com/store/apps/details?id=com.trinityapp.mobile" class="btn btn-secondary">Descargar App</a>
    </div>

    <script>
        // Extraer código de sala de la URL
        const pathParts = window.location.pathname.split('/');
        const roomCode = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
        
        if (roomCode && roomCode !== 'room') {
            document.getElementById('roomCode').textContent = roomCode.toUpperCase();
            
            // Construir deep link
            const deepLink = `https://trinity-app.es/room/${roomCode.toUpperCase()}`;
            const intentLink = `intent://trinity-app.es/room/${roomCode.toUpperCase()}#Intent;scheme=https;package=com.trinityapp.mobile;end`;
            
            // Actualizar botón
            document.getElementById('openApp').href = intentLink;
            
            // Intentar abrir la app automáticamente
            setTimeout(() => {
                // Primero intentar con intent
                window.location.href = intentLink;
                
                // Fallback después de 2 segundos
                setTimeout(() => {
                    document.getElementById('status').innerHTML = 
                        '<p>¿No tienes la app instalada?</p>';
                }, 2000);
            }, 500);
        } else {
            document.getElementById('roomCode').textContent = 'Código inválido';
            document.getElementById('status').innerHTML = 
                '<p style="color: #d32f2f;">No se pudo obtener el código de la sala</p>';
        }
    </script>
</body>
</html>
